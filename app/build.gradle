apply plugin: 'com.android.application'

android {
    namespace "dezz.status.widget"

    compileSdkVersion 36
    buildToolsVersion "36.0.0"

    defaultConfig {
        // Deliberately different from the upstream package so the fork can be installed next
        // to Status Widget 2.8.2 and keeps an entirely independent preference/database space.
        applicationId "ru.natro.statuswidget"
        minSdk 28
        //noinspection ExpiredTargetSdkVersion
        targetSdkVersion 28
        versionCode rootProject.ext.appVersionCode
        versionName rootProject.ext.appVersionName

        // Set the output APK name
        setProperty("archivesBaseName", "status-widget-ha-${versionName}")
    }

    // Car-specific builds: each flavor wires in one vendor SDK via <flavor>Implementation and
    // provides a dezz.status.widget.car.CarIntegrationFactory in its own source set
    // (app/src/<flavor>/java). Code in main must never reference vendor classes directly.
    flavorDimensions = ["car"]
    productFlavors {
        // Geely / eCarX head units (Monjaro and friends). This is the default build — its APK
        // keeps the historical un-suffixed name (see the output rename below).
        geely {
            dimension "car"
            getIsDefault().set(true)
        }
    }

    // geely is the canonical build: status-widget-vX.Y.Z-debug.apk without a flavor tag, matching
    // the pre-flavor naming users and update instructions already rely on. Any future flavor gets
    // an explicit -<flavor> tag in the file name.
    applicationVariants.configureEach { variant ->
        variant.outputs.configureEach {
            def flavorTag = variant.flavorName == "geely" ? "" : "-${variant.flavorName}"
            outputFileName = "status-widget-ha-${variant.versionName}${flavorTag}-${variant.buildType.name}.apk"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    signingConfigs {
        release {
            storeFile file('../keystore.jks')
            storePassword System.getenv("KEY_PASSWORD")
            keyAlias "key0"
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug {
            debuggable true
        }
    }

    buildFeatures {
        viewBinding true
    }
}

dependencies {
    implementation libs.activity
    implementation libs.adblib
    implementation libs.appcompat
    implementation libs.core
    implementation libs.constraintlayout
    implementation libs.material
    implementation libs.recyclerview

    // eCarX AdaptAPI (Geely flavor only) — class-jar converted from the vendor-distributed
    // dex jar; bundled into the APK the same way the infoDash fork ships it. Main source set
    // must not import com.ecarx.* — only app/src/geely may.
    geelyImplementation files('libs/geely/ecarx-adaptapi.jar')
    testImplementation 'junit:junit:4.13.2'
}
