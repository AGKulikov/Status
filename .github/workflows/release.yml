name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build"
        required: true

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Determine version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION=${{ github.event.inputs.tag }}
        else
          VERSION=${{ github.ref_name }}
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "version=${VERSION}"

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Decode stable update keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      shell: bash
      run: |
        test -n "$KEYSTORE_BASE64" || { echo "KEYSTORE_BASE64 is required" >&2; exit 1; }
        echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build release APKs
      env:
        VERSION_NAME: ${{ steps.version.outputs.version }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        test -n "$KEY_PASSWORD" || { echo "KEY_PASSWORD is required" >&2; exit 1; }
        ./gradlew assembleGeelyRelease
        APK="app/build/outputs/apk/geely/release/status-widget-ha-${VERSION_NAME}-release.apk"
        BADGING=$("$ANDROID_HOME/build-tools/36.0.0/aapt" dump badging "$APK")
        echo "$BADGING"
        echo "$BADGING" | grep -F "package: name='ru.natro.statuswidget'"
        echo "$BADGING" | grep -F "versionName='${VERSION_NAME}'"
        VERSION_CODE=$(echo "$BADGING" \
          | sed -n "s/.*versionCode='\\([0-9][0-9]*\\)'.*/\\1/p" \
          | head -n 1)
        test -n "$VERSION_CODE"
        test "$VERSION_CODE" -gt 208021074
        "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 "$APK"
        "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs "$APK" | tee /tmp/apk-certs.txt
        grep -qi "6e9855aedc008bbdd8a7fbf3f490be07f964b7ac658a837a1592647a08365c75" /tmp/apk-certs.txt
        mv "$APK" "app/build/outputs/apk/geely/release/status-widget-ha-${VERSION_NAME}.apk"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
        draft: false
        prerelease: false
        files: app/build/outputs/apk/geely/release/status-widget-ha-${{ steps.version.outputs.version }}.apk
