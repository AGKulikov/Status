name: Build geelyDebug

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'rewrite/**'
  pull_request:

# A feature branch with an open PR must produce one build, not an identical push build followed
# by a pull-request build. A newer revision supersedes a queued/running revision of that branch.
concurrency:
  group: geely-debug-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK 36
        shell: bash
        run: |
          # sdkmanager closes stdin after accepting all licenses, which gives `yes` SIGPIPE.
          # Temporarily disable pipefail so the step follows sdkmanager's exit code instead.
          set +o pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          set -o pipefail
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0"

      - name: Decode stable update keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          REQUIRE_STABLE: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          if [[ -n "$KEYSTORE_BASE64" ]]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            touch .stable-update-signing
          elif [[ "$REQUIRE_STABLE" == "true" ]]; then
            echo "KEYSTORE_BASE64 is required for installable update artifacts" >&2
            exit 1
          else
            echo "Stable keystore secret is unavailable; fork/PR build will use debug signing"
          fi

      - name: Test and build geelyDebug
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # CI revisions live above the earlier hand-built HA14..HA24 line, so every artifact is
          # accepted by Android as an upgrade. Four digits are reserved by build.gradle.
          REVISION=$((1000 + GITHUB_RUN_NUMBER))
          export VERSION_NAME="v2.8.2-ha${REVISION}"
          export VERSION_CODE=$((208020000 + REVISION))
          # Keep unit tests and APK assembly in separate Gradle invocations.
          # Running both task graphs together can make D8 see duplicate
          # non-namespaced AndroidX R classes in this legacy project.
          ./gradlew --no-daemon clean
          ./gradlew --no-daemon testGeelyDebugUnitTest
          ./gradlew --no-daemon assembleGeelyDebug

      - name: Verify APK identity, alignment and signature
        shell: bash
        run: |
          APK="$(find app/build/outputs/apk/geely/debug -name '*.apk' -print -quit)"
          test -n "$APK"
          "$ANDROID_HOME/build-tools/36.0.0/aapt" dump badging "$APK" | grep "package: name='ru.natro.statuswidget'"
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 "$APK"
          CERTS=$("$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs "$APK")
          echo "$CERTS"
          if [[ -f .stable-update-signing ]]; then
            echo "$CERTS" | grep -qi "6e9855aedc008bbdd8a7fbf3f490be07f964b7ac658a837a1592647a08365c75"
          fi
          sha256sum "$APK" | tee "$APK.sha256"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: status-widget-ha-geelyDebug
          path: |
            app/build/outputs/apk/geely/debug/*.apk
            app/build/outputs/apk/geely/debug/*.sha256
          if-no-files-found: error
          retention-days: 30

  # One-time HA1080 publication path. It is deliberately split in two: untrusted source is built
  # with a read-only token, while the write-token job only verifies and publishes that artifact.
  build-ha1080-release:
    needs: build
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/ha1080-actions-phone' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout exact HA1080 source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK 36
        shell: bash
        run: |
          set +o pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          set -o pipefail
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0"

      - name: Decode mandatory stable update keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        shell: bash
        run: |
          test -n "$KEYSTORE_BASE64" || {
            echo "Stable KEYSTORE_BASE64 is required for HA1080" >&2
            exit 1
          }
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Build and verify exact HA1080 release
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          VERSION_NAME: v2.8.2-ha1080
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          test -n "$KEY_PASSWORD" || {
            echo "Stable KEY_PASSWORD is required for HA1080" >&2
            exit 1
          }
          chmod +x gradlew
          ./gradlew --no-daemon assembleGeelyRelease
          APK="app/build/outputs/apk/geely/release/status-widget-ha-${VERSION_NAME}-release.apk"
          BADGING=$("$ANDROID_HOME/build-tools/36.0.0/aapt" dump badging "$APK")
          echo "$BADGING"
          echo "$BADGING" | grep -F "package: name='ru.natro.statuswidget'"
          echo "$BADGING" | grep -F "versionName='${VERSION_NAME}'"
          VERSION_CODE=$(echo "$BADGING" \
            | sed -n "s/.*versionCode='\([0-9][0-9]*\)'.*/\1/p" \
            | head -n 1)
          test "$VERSION_CODE" -eq 208021080
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 "$APK"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" \
            verify --verbose --print-certs "$APK" | tee /tmp/ha1080-certs.txt
          grep -qi "6e9855aedc008bbdd8a7fbf3f490be07f964b7ac658a837a1592647a08365c75" \
            /tmp/ha1080-certs.txt
          mkdir -p release-out
          cp "$APK" "release-out/status-widget-ha-${VERSION_NAME}.apk"
          cd release-out
          sha256sum "status-widget-ha-${VERSION_NAME}.apk" \
            > "status-widget-ha-${VERSION_NAME}.apk.sha256"

      - name: Upload verified HA1080 release
        uses: actions/upload-artifact@v4
        with:
          name: status-widget-ha-v2.8.2-ha1080-release
          path: release-out/*
          if-no-files-found: error
          retention-days: 30

  publish-ha1080:
    needs: build-ha1080-release
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/ha1080-actions-phone' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download verified HA1080 release
        uses: actions/download-artifact@v4
        with:
          name: status-widget-ha-v2.8.2-ha1080-release
          path: release-out

      - name: Publish exact source tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RELEASE_TAG: v2.8.2-ha1080
        shell: bash
        run: |
          cd release-out
          sha256sum -c "status-widget-ha-${RELEASE_TAG}.apk.sha256"
          TAG_SHA=$(gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
            --jq '.object.sha' 2>/dev/null || true)
          if [[ -n "$TAG_SHA" ]]; then
            test "$TAG_SHA" = "$HEAD_SHA" || {
              echo "${RELEASE_TAG} points to ${TAG_SHA}, expected ${HEAD_SHA}" >&2
              exit 1
            }
            gh release view "$RELEASE_TAG" >/dev/null
            echo "${RELEASE_TAG} is already published from the verified source"
            exit 0
          fi
          gh release create "$RELEASE_TAG" \
            "status-widget-ha-${RELEASE_TAG}.apk" \
            "status-widget-ha-${RELEASE_TAG}.apk.sha256" \
            --target "$HEAD_SHA" \
            --title "Release ${RELEASE_TAG}" \
            --notes "HA1080: exact-iPhone connector, visual action grids and four-corner panel editing."
