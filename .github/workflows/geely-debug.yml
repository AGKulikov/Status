name: Build geelyDebug

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'rewrite/**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK 36
        shell: bash
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0"

      - name: Build geelyDebug
        env:
          VERSION_NAME: v2.8.2-ha${{ github.run_number }}
        run: |
          export VERSION_CODE=$((208020000 + GITHUB_RUN_NUMBER))
          ./gradlew --no-daemon clean testGeelyDebugUnitTest assembleGeelyDebug

      - name: Verify APK identity, alignment and signature
        shell: bash
        run: |
          APK="$(find app/build/outputs/apk/geely/debug -name '*.apk' -print -quit)"
          test -n "$APK"
          "$ANDROID_HOME/build-tools/36.0.0/aapt" dump badging "$APK" | grep "package: name='ru.natro.statuswidget'"
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 "$APK"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs "$APK"
          sha256sum "$APK" | tee "$APK.sha256"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: status-widget-ha-geelyDebug
          path: |
            app/build/outputs/apk/geely/debug/*.apk
            app/build/outputs/apk/geely/debug/*.sha256
          if-no-files-found: error
          retention-days: 30
