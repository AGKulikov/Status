name: Build merged Status + Navigator

on:
  workflow_dispatch:
    inputs:
      base_release_tag:
        description: Draft release containing navigator-base.apk
        required: true
        default: navigator-mod-build-input

concurrency:
  group: merged-navigator-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK 36
        shell: bash
        run: |
          set +o pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          set -o pipefail
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0"

      - name: Decode stable update keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        shell: bash
        run: |
          test -n "$KEYSTORE_BASE64" || {
            echo "KEYSTORE_BASE64 is required for an installable update" >&2
            exit 1
          }
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Download and verify reviewed Navigator base
        shell: bash
        run: |
          mkdir -p build-input
          gh release download "${{ inputs.base_release_tag }}" \
            --pattern navigator-base.apk --dir build-input
          echo \
            "a529f4f180ce42e29b1b7b7d801d21428ed8801d65271c46b9a29cb5769b4c3b  build-input/navigator-base.apk" \
            | sha256sum -c -

      - name: Test and build Status resource package 0x80
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        shell: bash
        run: |
          test -n "$KEY_PASSWORD" || {
            echo "KEY_PASSWORD is required" >&2
            exit 1
          }
          REVISION=$((2000 + GITHUB_RUN_NUMBER))
          export VERSION_NAME="v2.8.2-ha${REVISION}"
          export VERSION_CODE=$((208020000 + REVISION))
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          ./gradlew --no-daemon clean
          ./gradlew --no-daemon testGeelyDebugUnitTest
          ./gradlew --no-daemon -PembeddedNavigatorResources assembleGeelyRelease
          STATUS_APK="$(find app/build/outputs/apk/geely/release -name '*.apk' -print -quit)"
          test -n "$STATUS_APK"
          echo "STATUS_APK=$STATUS_APK" >> "$GITHUB_ENV"
          "$ANDROID_HOME/build-tools/36.0.0/aapt2" dump resources "$STATUS_APK" \
            > /tmp/status-resources.txt
          grep -m1 -E 'Package.*id=80' /tmp/status-resources.txt
          mkdir -p /tmp/status-dex
          unzip -q "$STATUS_APK" 'classes*.dex' -d /tmp/status-dex
          grep -aRl 'androidx/concurrent/futures/ResolvableFuture' /tmp/status-dex \
            > /tmp/resolvable-future-dex.txt
          test -s /tmp/resolvable-future-dex.txt

      - name: Download pinned Apktool
        shell: bash
        run: |
          curl -fL --retry 3 \
            -o build-input/apktool_3.0.2.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v3.0.2/apktool_3.0.2.jar
          echo \
            "eee4669a704a14e0623407e6701b0b91887e61e1e4049cb7a82833e14ae8b5fd  build-input/apktool_3.0.2.jar" \
            | sha256sum -c -

      - name: Merge and sign the one-package mod
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
        shell: bash
        run: |
          export APKSIGNER="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          export ZIPALIGN="$ANDROID_HOME/build-tools/36.0.0/zipalign"
          mkdir -p app/build/outputs/apk/merged
          OUTPUT="app/build/outputs/apk/merged/status-widget-navigator-${VERSION_NAME}.apk"
          bash tools/navigator-mod/build-merged-mod.sh \
            build-input/navigator-base.apk \
            "$STATUS_APK" \
            build-input/apktool_3.0.2.jar \
            "$OUTPUT"
          echo "MERGED_APK=$OUTPUT" >> "$GITHUB_ENV"

      - name: Verify update identity, alignment and certificate
        shell: bash
        run: |
          "$ANDROID_HOME/build-tools/36.0.0/aapt" dump badging "$MERGED_APK" \
            > /tmp/merged-badging.txt
          grep "package: name='ru.natro.statuswidget'" /tmp/merged-badging.txt
          grep "versionName='$VERSION_NAME'" /tmp/merged-badging.txt
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 "$MERGED_APK"
          CERTS=$("$ANDROID_HOME/build-tools/36.0.0/apksigner" \
            verify --verbose --print-certs "$MERGED_APK")
          echo "$CERTS"
          echo "$CERTS" \
            | grep -qi "6e9855aedc008bbdd8a7fbf3f490be07f964b7ac658a837a1592647a08365c75"
          sha256sum "$MERGED_APK" > "$MERGED_APK.sha256"

      - name: Upload merged APK
        uses: actions/upload-artifact@v4
        with:
          name: status-widget-navigator
          path: |
            app/build/outputs/apk/merged/*.apk
            app/build/outputs/apk/merged/*.sha256
          if-no-files-found: error
          retention-days: 30
