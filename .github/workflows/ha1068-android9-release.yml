name: Rebuild HA1068 Android 9 fix

on:
  push:
    branches:
      - 'rewrite/ha1068-android9-fix'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install Android SDK 36
        shell: bash
        run: |
          set +o pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          set -o pipefail
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0"

      - name: Decode stable update keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        shell: bash
        run: |
          test -n "$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Test and build stable HA1075
        env:
          VERSION_NAME: v2.8.2-ha1075
          VERSION_CODE: '208021075'
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          test -n "$KEY_PASSWORD"
          ./gradlew --no-daemon clean
          ./gradlew --no-daemon testGeelyDebugUnitTest
          ./gradlew --no-daemon assembleGeelyRelease

      - name: Verify release APK
        shell: bash
        run: |
          APK="$(find app/build/outputs/apk/geely/release -name '*.apk' -print -quit)"
          test -n "$APK"
          "$ANDROID_HOME/build-tools/36.0.0/aapt" dump badging "$APK" | grep "package: name='ru.natro.statuswidget' versionCode='208021075' versionName='v2.8.2-ha1075'"
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 "$APK"
          CERTS=$("$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs --min-sdk-version 28 "$APK")
          echo "$CERTS"
          echo "$CERTS" | grep -qi "6e9855aedc008bbdd8a7fbf3f490be07f964b7ac658a837a1592647a08365c75"
          unzip -t "$APK"
          sha256sum "$APK" | tee "$APK.sha256"

      - name: Upload stable APK
        uses: actions/upload-artifact@v4
        with:
          name: status-widget-ha-v2.8.2-ha1075-stable
          path: |
            app/build/outputs/apk/geely/release/*.apk
            app/build/outputs/apk/geely/release/*.sha256
          if-no-files-found: error
          retention-days: 30
