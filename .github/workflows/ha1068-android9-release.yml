name: Rebuild HA1068 Android 9 fix

on:
  push:
    branches:
      - 'rewrite/ha1068-android9-fix'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install Android SDK 36
        shell: bash
        run: |
          set +o pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          set -o pipefail
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0"

      - name: Create staging signing key
        shell: bash
        run: |
          keytool -genkeypair -keystore keystore.jks \
            -storepass ci-staging-only -keypass ci-staging-only \
            -alias status-widget-ha -keyalg RSA -keysize 2048 -validity 1 \
            -dname "CN=CI Staging"

      - name: Test and build HA1075 release staging APK
        env:
          VERSION_NAME: v2.8.2-ha1075
          VERSION_CODE: '208021075'
          KEY_PASSWORD: ci-staging-only
          KEY_ALIAS: status-widget-ha
        run: |
          ./gradlew --no-daemon clean
          ./gradlew --no-daemon testGeelyDebugUnitTest
          ./gradlew --no-daemon assembleGeelyRelease

      - name: Verify staging release APK
        shell: bash
        run: |
          APK="$(find app/build/outputs/apk/geely/release -name '*.apk' -print -quit)"
          test -n "$APK"
          "$ANDROID_HOME/build-tools/36.0.0/aapt" dump badging "$APK" | grep "package: name='ru.natro.statuswidget' versionCode='208021075' versionName='v2.8.2-ha1075'"
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 "$APK"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs --min-sdk-version 28 "$APK"
          unzip -t "$APK"
          sha256sum "$APK" | tee "$APK.sha256"

      - name: Upload release staging APK
        uses: actions/upload-artifact@v4
        with:
          name: status-widget-ha-v2.8.2-ha1075-release-staging
          path: |
            app/build/outputs/apk/geely/release/*.apk
            app/build/outputs/apk/geely/release/*.sha256
          if-no-files-found: error
          retention-days: 30
