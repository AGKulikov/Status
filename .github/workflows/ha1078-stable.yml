name: Build HA1078 release candidate

on:
  push:
    branches:
      - release/ha1078-status-row-height

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK 36
        shell: bash
        run: |
          set +o pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          set -o pipefail
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0"

      - name: Generate disposable candidate signer
        shell: bash
        run: |
          keytool -genkeypair -noprompt \
            -storetype PKCS12 \
            -keystore "$RUNNER_TEMP/ha1078-candidate.jks" \
            -storepass candidate-only \
            -keypass candidate-only \
            -alias candidate-only \
            -keyalg RSA -keysize 2048 -validity 2 \
            -dname "CN=Disposable HA1078 Candidate"

      - name: Test and build non-debuggable release candidate
        env:
          VERSION_NAME: v2.8.2-ha1078
          VERSION_CODE: '208021078'
          KEYSTORE_FILE: ${{ runner.temp }}/ha1078-candidate.jks
          KEY_PASSWORD: candidate-only
          KEY_ALIAS: candidate-only
        run: |
          ./gradlew --no-daemon clean
          ./gradlew --no-daemon testGeelyDebugUnitTest
          ./gradlew --no-daemon assembleGeelyRelease

      - name: Verify release candidate
        shell: bash
        run: |
          APK="app/build/outputs/apk/geely/release/status-widget-ha-v2.8.2-ha1078-release.apk"
          FINAL="app/build/outputs/apk/geely/release/status-widget-ha-v2.8.2-ha1078-candidate.apk"
          test -f "$APK"
          BADGING=$("$ANDROID_HOME/build-tools/36.0.0/aapt" dump badging "$APK")
          echo "$BADGING"
          echo "$BADGING" | grep -q "package: name='ru.natro.statuswidget' versionCode='208021078' versionName='v2.8.2-ha1078'"
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 "$APK"
          unzip -p "$APK" 'classes*.dex' > all-classes.dex
          strings all-classes.dex > all-classes.strings
          grep -q 'androidx/concurrent/futures/ResolvableFuture' all-classes.strings
          if "$ANDROID_HOME/build-tools/36.0.0/aapt" dump xmltree "$APK" AndroidManifest.xml | grep -q 'android:debuggable'; then
            echo "Release candidate must not be debuggable" >&2
            exit 1
          fi
          mv "$APK" "$FINAL"
          sha256sum "$FINAL" | tee "$FINAL.sha256"

      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: status-widget-ha-v2.8.2-ha1078-release-candidate
          path: |
            app/build/outputs/apk/geely/release/status-widget-ha-v2.8.2-ha1078-candidate.apk
            app/build/outputs/apk/geely/release/status-widget-ha-v2.8.2-ha1078-candidate.apk.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Report candidate workflow run
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}';
            const body = [
              `HA1078 release-candidate workflow: **${state}**`,
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: ${context.sha}`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 9,
              body
            });
